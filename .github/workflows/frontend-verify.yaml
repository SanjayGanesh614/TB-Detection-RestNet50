name: Frontend Verification
on:
  push:
    branches:
      - '**'        # Triggers on every push to any branch
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**' # Only triggers for frontend changes

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # All commands run inside the frontend folder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        # Checks for code style and potential React bugs
        run: npm run lint

      - name: Snyk Security Scan
        # Checks for vulnerable npm packages
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Jules UI Test Generation
        # Jules writes component tests for your React UI
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            Analyze the React components in the 'frontend' folder. 
            Identify critical UI edge cases (loading states, empty lists, button debouncing).
            Write Vitest/Jest unit tests and save them to frontend/src/__tests__/generated.test.tsx.
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

      - name: Run Unit Tests
        # Runs your test suite (Vitest or Jest)
        run: npm test -- --coverage